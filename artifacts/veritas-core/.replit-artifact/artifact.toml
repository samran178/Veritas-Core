kind = "web"
previewPath = "/"
title = "Veritas Core"
version = "1.0.0"
id = "artifacts/veritas-core"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24978

[services.development]
run = "pnpm --filter @workspace/veritas-core run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/veritas-core", "run", "build" ]
publicDir = "artifacts/veritas-core/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24978"
BASE_PATH = "/"
